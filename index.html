<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        header {
            padding: 50px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff9800;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e68900;
            transform: scale(1.1);
        }

        .card {
            background: white;
            color: black;
            margin: 30px auto;
            padding: 20px;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <header>
        <h1>🚀 Website của Huy</h1>
        <p>Chào mừng đến với website đầu tiên của mình</p>
        <button class="btn" onclick="showMessage()">Click me 😎</button>
    </header>

    <div class="card">
        <h2>💡 Giới thiệu</h2>
        <p>Mình đang học lập trình web và đây là sản phẩm đầu tiên 🎉</p>
    </div>

    <div class="card">
        <h2>📚 Kỹ năng</h2>
        <p>HTML • CSS • Git • GitHub</p>
    </div>

    <footer>
        <p>© 2026 Huy Dev 🔥</p>
    </footer>

    <script>
        function showMessage() {
            alert("Chào bạn! 😄 Cảm ơn đã ghé thăm website!");
        }
    </script>

</body>
</html>
